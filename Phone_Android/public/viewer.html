<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jumu'aa Connected | Creator Pro</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(--bg);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: var(--text-main);
        }

        /* --- HEADER --- */
        .header {
            padding: 14px 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        .btn-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            transition: 0.2s all;
            cursor: pointer;
        }

        .btn-pill:active { transform: scale(0.95); background: var(--accent); }

        .header-center { flex: 1; margin: 0 15px; }
        .header-center b { display: block; font-size: 15px; font-weight: 800; letter-spacing: -0.02em; }
        .header-center span { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

        #page-info {
            background: rgba(59, 130, 246, 0.1);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.2);
            direction: ltr !important;
        }

        /* --- VIEWER --- */
        .viewer-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            margin: 6px;
            border-radius: 16px;
            touch-action: none;
            direction: ltr !important; 
        }

        canvas {
            background: white;
            border-radius: 4px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1);
            will-change: transform;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 90;
        }

        .zoom-btn {
            width: 46px; height: 46px; border: 1px solid var(--border);
            border-radius: 14px; background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px); color: white; font-size: 20px; 
            cursor: pointer; transition: 0.2s;
        }

        /* --- CONTROL PANEL --- */
        .footer-panel {
            background: var(--card);
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
        }

        .creator-controls {
            display: none;
            padding: 20px;
            background: linear-gradient(180deg, #0f172a, #020617);
            border-bottom: 1px solid var(--border);
        }

        .input-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }

        .input-field {
            flex: 1; background: #020617; color: #fff;
            border: 1px solid var(--border); border-radius: 14px;
            padding: 0 16px; font-size: 14px; height: 48px; outline: none;
        }

        .action-btn {
            flex: 1; height: 54px; border: none; border-radius: 16px;
            font-weight: 800; color: white; cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }

        .btn-rec { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn-rec.active { 
            background: var(--danger) !important; 
            animation: pulse-recording 1.5s infinite;
        }

        @keyframes pulse-recording { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .nav-bar { display: flex; height: 85px; gap: 12px; padding: 0 20px; align-items: center; }
        .nav-btn { 
            flex: 1; height: 54px; border: none; border-radius: 18px; 
            background: rgba(255,255,255,0.05); color: white; 
            font-weight: 800; cursor: pointer; font-size: 24px;
        }
        
        .btn-prev { color: var(--danger); }
        .btn-next { color: var(--success); }
        .btn-finish { 
            background: linear-gradient(135deg, #3b82f6, #1d4ed8) !important; 
            font-size: 12px !important; text-transform: uppercase; flex: 1.6 !important;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .status-msg { font-size: 13px; color: var(--text-dim); text-align: center; height: 18px; margin-top: 8px; font-weight: 600; }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-actions">
            <a href="/admin.html" class="btn-pill">🏠</a>
            <select id="langSelect" onchange="changeLanguage(this.value)" class="btn-pill">
                <option value="en">EN</option>
                <option value="ar">AR</option>
                <option value="fr">FR</option>
            </select>
        </div>
        
        <div class="header-center">
            <b id="txt-title">Créateur de Khutbah</b>
            <span id="txt-progress">Session: 0/0</span>
        </div>
        
        <div id="page-info">1 / 1</div>
    </header>

    <main class="viewer-container" id="wrapper">
        <canvas id="pdfCanvas"></canvas>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">＋</button>
            <button class="zoom-btn" onclick="zoomOut()">－</button>
            <button class="zoom-btn" onclick="fit()" style="font-size: 10px; font-weight: 900;">FIT</button>
        </div>
    </main>

    <footer class="footer-panel">
        <div class="creator-controls" id="recorderUI">
            <div class="input-row">
                <select id="micSelect" class="input-field"></select>
                <button class="btn-pill" style="height: 48px;" onclick="getMics()">🔄</button>
            </div>
            
            <div class="input-row">
                <button class="action-btn btn-rec" id="recBtn" onclick="toggleRecording()">🎙 RECORD</button>
            </div>
            
            <div class="input-row">
                <input class="input-field" type="file" id="audioFile" accept="audio/*">
                <button class="action-btn" style="background:var(--accent); width: 60px; flex:none;" onclick="upload()">⬆</button>
            </div>
            <div id="status" class="status-msg"></div>
        </div>

        <nav class="nav-bar">
            <button class="nav-btn btn-prev" onclick="prev()">⬅</button>
            <button class="nav-btn btn-finish" id="finishBtn" onclick="finish()">SAVE & EXIT</button>
            <button class="nav-btn btn-next" onclick="next()">➡</button>
        </nav>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <script>
        const translations = {
            en: { title: "Khutbah Creator", record: "🎙 RECORD", stop: "⏹ STOP & SAVE", progress: "Session", saved: "✅ Saved! Next page...", error: "❌ Error.", finish: "SAVE & EXIT" },
            ar: { title: "منشئ الخطبة", record: "🎙 تسجيل", stop: "⏹ إيقاف وحفظ", progress: "الجلسة", saved: "✅ تم الحفظ! جاري الانتقال...", error: "❌ خطأ.", finish: "حفظ وخروج" },
            fr: { title: "Créateur de Khutbah", record: "🎙 ENREGISTRER", stop: "⏹ ARRÊTER & SAUVER", progress: "Session", saved: "✅ Enregistré ! Suivant...", error: "❌ Erreur.", finish: "ENREGISTRER & QUITTER" }
        };

        const params = new URLSearchParams(window.location.search);
        let file = params.get("file") || "", id = params.get("id") || "";
        
        // 1. GET PRESERVED LANGUAGE
        let currentLang = localStorage.getItem('preferredLang') || 'fr';

        const canvas = document.getElementById("pdfCanvas"), ctx = canvas.getContext("2d");
        let pdfDoc = null, page = 1, scale = 1.0, visualScale = 1, panX = 0, panY = 0, rec, chunks = [];

        if (file && !file.startsWith("/")) file = "/" + file;
        if (params.get("mode") === "edit") document.getElementById("recorderUI").style.display = "block";

        pdfjsLib.getDocument(file).promise.then(pdf => {
            pdfDoc = pdf; fit(); updateProgress(); getMics();
            // 2. APPLY PRESERVED LANGUAGE ON INITIAL LOAD
            document.getElementById('langSelect').value = currentLang;
            changeLanguage(currentLang);
        });

        function changeLanguage(lang) {
            currentLang = lang;
            // 3. SAVE CHOICE
            localStorage.setItem('preferredLang', lang);
            
            const t = translations[lang];
            document.getElementById("txt-title").innerText = t.title;
            document.getElementById("finishBtn").innerText = t.finish;
            
            const recBtn = document.getElementById("recBtn");
            if (!recBtn.classList.contains("active")) recBtn.innerText = t.record;

            const prevBtn = document.querySelector(".btn-prev");
            const nextBtn = document.querySelector(".btn-next");
            const zoomUI = document.querySelector(".zoom-controls");

            if (lang === 'ar') {
                document.body.style.direction = 'rtl';
                prevBtn.innerText = "➡"; nextBtn.innerText = "⬅";
                zoomUI.style.right = "auto"; zoomUI.style.left = "20px";
            } else {
                document.body.style.direction = 'ltr';
                prevBtn.innerText = "⬅"; nextBtn.innerText = "➡";
                zoomUI.style.left = "auto"; zoomUI.style.right = "20px";
            }
            updateProgress();
        }

        async function getMics() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const select = document.getElementById("micSelect");
                select.innerHTML = "";
                devices.filter(d => d.kind === 'audioinput').forEach(d => {
                    const opt = document.createElement("option");
                    opt.value = d.deviceId;
                    opt.text = d.label || `Mic ${select.length + 1}`;
                    select.appendChild(opt);
                });
            } catch (e) {}
        }

        async function toggleRecording() {
            const btn = document.getElementById("recBtn");
            const t = translations[currentLang];
            if (!rec || rec.state === "inactive") {
                try {
                    const micId = document.getElementById("micSelect").value;
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: micId ? { deviceId: { exact: micId } } : true });
                    const options = { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg' };
                    rec = new MediaRecorder(stream, options);
                    chunks = [];
                    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    rec.onstop = async () => {
                        const status = document.getElementById("status");
                        status.innerText = "⏳...";
                        const blob = new Blob(chunks, { type: rec.mimeType });
                        if (blob.size === 0) return;
                        const form = new FormData();
                        form.append("audio", blob, `page${page}.wav`);
                        form.append("id", id); form.append("page", page); form.append("totalPages", pdfDoc.numPages);
                        try {
                            const res = await fetch("/upload-audio", { method: "POST", body: form });
                            if (res.ok) { status.innerText = t.saved; nextPageAfterSave(); }
                        } catch (err) { status.innerText = t.error; }
                        rec.stream.getTracks().forEach(t => t.stop());
                    };
                    rec.start();
                    btn.classList.add("active"); btn.innerText = t.stop;
                } catch (err) { alert("Mic error: " + err.message); }
            } else {
                btn.classList.remove("active"); btn.innerText = t.record; rec.stop();
            }
        }

        function render() {
            if (!pdfDoc) return;
            pdfDoc.getPage(page).then(p => {
                const viewport = p.getViewport({ scale });
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * dpr); canvas.height = Math.floor(viewport.height * dpr);
                canvas.style.width = viewport.width + "px"; canvas.style.height = viewport.height + "px";
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                p.render({ canvasContext: ctx, viewport }).promise.then(() => {
                    visualScale = 1; updateTransform();
                    document.getElementById("page-info").innerText = `${page} / ${pdfDoc.numPages}`;
                });
            });
        }

        function updateTransform() { canvas.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${visualScale})`; }
        function nextPageAfterSave() { if (page < pdfDoc.numPages) { setTimeout(() => { page++; resetView(); render(); updateProgress(); }, 1200); } }
        function next() { if (page < pdfDoc.numPages) { page++; resetView(); render(); } }
        function prev() { if (page > 1) { page--; resetView(); render(); } }
        function resetView() { panX = 0; panY = 0; visualScale = 1; document.getElementById("status").innerText = ""; document.getElementById("audioFile").value = ""; }
        function zoomIn() { scale *= 1.3; render(); }
        function zoomOut() { scale = Math.max(0.3, scale / 1.3); render(); }
        function fit() {
            if (!pdfDoc) return;
            pdfDoc.getPage(page).then(p => {
                const v = p.getViewport({ scale: 1 });
                scale = Math.min(window.innerWidth / v.width, document.getElementById("wrapper").clientHeight / v.height) * 0.95;
                resetView(); render();
            });
        }

        function upload() {
            const f = document.getElementById("audioFile").files[0];
            if (!f) return;
            const form = new FormData();
            form.append("audio", f); form.append("id", id); form.append("page", page); form.append("totalPages", pdfDoc.numPages);
            fetch("/upload-audio", { method: "POST", body: form }).then(() => {
                document.getElementById("status").innerText = translations[currentLang].saved; nextPageAfterSave();
            });
        }

async function updateProgress() {
    try {
        const res = await fetch("/check-complete", { 
            method: "POST", 
            headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({id})
        });
        const data = await res.json();
        
        // On récupère le total soit du serveur, soit du PDF chargé
        const total = data.total || (pdfDoc ? pdfDoc.numPages : 0);
        const done = data.done || 0;
        
        const t = translations[currentLang];
        document.getElementById("txt-progress").innerText = `${t.progress}: ${done}/${total}`;
        
        // Couleur visuelle pour indiquer si c'est fini
        document.getElementById("txt-progress").style.color = (done === total && total > 0) ? "var(--success)" : "var(--accent)";
    } catch(e) {
        console.error("Erreur de progression:", e);
    }
}

        async function finish() {
            const res = await fetch("/check-complete", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id})});
            const data = await res.json();
            if (!data.ok) return alert("Missing audio for pages: " + data.missing.join(", "));
            await fetch("/mark-ready", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id})});
            window.location.href = "/admin.html";
        }

        let sx, sy, lx = 0, dragging = false, touchMode = null;
        const getDist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
        canvas.addEventListener('mousedown', e => { dragging = true; sx = e.clientX - panX; sy = e.clientY - panY; });
        window.addEventListener('mousemove', e => { if (dragging) { panX = e.clientX - sx; panY = e.clientY - sy; updateTransform(); } });
        window.addEventListener('mouseup', () => dragging = false);
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) { touchMode = 'drag'; sx = e.touches[0].clientX - panX; sy = e.touches[0].clientY - panY; }
            else if (e.touches.length === 2) { touchMode = 'pinch'; lx = getDist(e.touches); }
        }, {passive: false});
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (touchMode === 'drag' && e.touches.length === 1) { panX = e.touches[0].clientX - sx; panY = e.touches[0].clientY - sy; }
            else if (touchMode === 'pinch' && e.touches.length === 2) { visualScale = getDist(e.touches) / lx; }
            updateTransform();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { if (touchMode === 'pinch') { scale *= visualScale; render(); } touchMode = null; });
        window.addEventListener('resize', fit);
    </script>
</body>
</html>

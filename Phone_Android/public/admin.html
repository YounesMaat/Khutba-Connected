<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jumu'aa Connected | Admin</title>

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 40px;
            transition: direction 0.3s ease;
        }

        /* MODERN GLASS HEADER */
        .header {
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        .lang-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .wrapper {
            padding: 24px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .upload-area {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .upload-controls { display: flex; gap: 12px; align-items: center; }

        #pdf { display: none; }
        .file-label {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .upload-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

        .section {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            min-height: 200px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .section h3 { margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }

        .item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .item-title { font-weight: 600; font-size: 15px; margin-bottom: 14px; color: var(--text-main); }

        .actions { display: flex; gap: 8px; }
        .actions button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; color: white; transition: all 0.2s; }

        .edit { background: rgba(59, 130, 246, 0.15); color: var(--accent) !important; }
        .start { background: var(--success); }
        .delete { background: rgba(239, 68, 68, 0.1); color: var(--danger) !important; }

        .footer { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 40px; }
        .empty-msg { text-align: center; color: var(--text-dim); font-size: 13px; padding: 30px 0; font-style: italic; }

        body[dir="rtl"] .title { gap: 10px; }
    </style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <div class="title">🕌 Jumu'aa Connected</div>
        <div class="subtitle" id="ui-subtitle">Panneau de Contrôle Masjid</div>
    </div>
    <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
    </select>
</div>

<div class="wrapper">
    <div class="upload-area">
        <div style="font-size: 13px; font-weight: 600; color: var(--text-dim)" id="ui-upload-label">Télécharger une nouvelle Khutbah (PDF)</div>
        <div class="upload-controls">
            <label for="pdf" class="file-label" id="file-name">Aucun fichier sélectionné...</label>
            <input type="file" id="pdf" accept="application/pdf" onchange="updateFileName()">
            <button class="upload-btn" onclick="uploadPDF()" id="ui-upload-btn">Télécharger</button>
        </div>
    </div>

    <div class="grid">
        <div class="section">
            <div class="section-header">
                <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--warning)"></div>
                <h3 id="ui-drafts-title">Brouillons</h3>
            </div>
            <div id="draft"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--success)"></div>
                <h3 id="ui-ready-title">Prêt pour Jumu'aa</h3>
            </div>
            <div id="ready"></div>
        </div>
    </div>

    <div class="footer">
        Jumu'aa Connected &bull; <span id="ui-footer">Système de Contrôle Interne</span>
    </div>
</div>

<script>
const translations = {
    fr: {
        subtitle: "Panneau de Contrôle Masjid",
        uploadLabel: "Télécharger une nouvelle Khutbah (PDF)",
        noFile: "Aucun fichier sélectionné...",
        uploadBtn: "Télécharger",
        uploading: "Téléchargement...",
        drafts: "Brouillons",
        ready: "Prêt pour Jumu'aa",
        emptyDrafts: "Aucun brouillon trouvé",
        emptyReady: "Aucun fichier prêt trouvé",
        btnEdit: "Modifier",
        btnDelete: "Supprimer",
        btnStart: "Lancer le Direct",
        confirmDelete: "Êtes-vous sûr ? Cela ne peut pas être annulé.",
        footer: "Système de Contrôle Interne",
        allSet: "Tout est prêt !",
        completeEdits: "Terminez les modifications pour les voir ici"
    },
    en: {
        subtitle: "Masjid Live Control Panel",
        uploadLabel: "Upload New Khutbah (PDF)",
        noFile: "No file selected...",
        uploadBtn: "Upload",
        uploading: "Uploading...",
        drafts: "Draft Khutbahs",
        ready: "Ready for Jumu'aa",
        emptyDrafts: "No drafts found",
        emptyReady: "No ready files found",
        btnEdit: "Edit",
        btnDelete: "Delete",
        btnStart: "Start Live",
        confirmDelete: "Are you sure? This cannot be undone.",
        footer: "Internal Control System",
        allSet: "All set!",
        completeEdits: "Complete edits to see them here"
    },
    ar: {
        subtitle: "لوحة تحكم المسجد المباشرة",
        uploadLabel: "رفع خطبة جديدة (PDF)",
        noFile: "لم يتم اختيار ملف...",
        uploadBtn: "رفع",
        uploading: "جاري الرفع...",
        drafts: "مسودات الخطب",
        ready: "جاهز للجمعة",
        emptyDrafts: "لا توجد مسودات",
        emptyReady: "لا توجد ملفات جاهزة",
        btnEdit: "تعديل",
        btnDelete: "حذف",
        btnStart: "بدء البث",
        confirmDelete: "هل أنت متأكد؟ لا يمكن التراجع عن هذا الإجراء.",
        footer: "نظام التحكم الداخلي",
        allSet: "تم الانتهاء!",
        completeEdits: "أكمل التعديلات لتظهر هنا"
    }
};

// 1. LOAD PRESERVED LANGUAGE OR DEFAULT TO FR
let currentLang = localStorage.getItem('preferredLang') || 'fr';

function changeLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('preferredLang', lang); // 2. SAVE CHOICE
    
    const t = translations[lang];
    document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
    
    document.getElementById('ui-subtitle').innerText = t.subtitle;
    document.getElementById('ui-upload-label').innerText = t.uploadLabel;
    document.getElementById('ui-upload-btn').innerText = t.uploadBtn;
    document.getElementById('ui-drafts-title').innerText = t.drafts;
    document.getElementById('ui-ready-title').innerText = t.ready;
    document.getElementById('ui-footer').innerText = t.footer;
    
    updateFileName(); 
    loadList(); 
}

function updateFileName() {
    const input = document.getElementById('pdf');
    const label = document.getElementById('file-name');
    if (input.files[0]) {
        label.innerText = input.files[0].name;
        label.style.color = "var(--text-main)";
    } else {
        label.innerText = translations[currentLang].noFile;
        label.style.color = "var(--text-dim)";
    }
}

async function uploadPDF() {
    const file = document.getElementById("pdf").files[0];
    if (!file) return alert(translations[currentLang].noFile);

    const btn = document.getElementById("ui-upload-btn");
    btn.innerText = translations[currentLang].uploading;
    btn.style.opacity = "0.7";

    const form = new FormData();
    form.append("pdf", file);

    try {
        const res = await fetch("/upload", { method: "POST", body: form });
        const data = await res.json();
        window.location.href = `/viewer.html?id=${encodeURIComponent(data.id)}&file=${encodeURIComponent(data.file)}&mode=edit`;
    } catch (e) {
        alert("Upload failed");
        btn.innerText = translations[currentLang].uploadBtn;
        btn.style.opacity = "1";
    }
}

async function loadList() {
    const res = await fetch("/list?t=" + Date.now());
    const data = await res.json();
    const t = translations[currentLang];

    const draft = document.getElementById("draft");
    const ready = document.getElementById("ready");

    draft.innerHTML = "";
    ready.innerHTML = "";

    if (data.length === 0) {
        draft.innerHTML = `<div class="empty-msg">${t.emptyDrafts}</div>`;
        ready.innerHTML = `<div class="empty-msg">${t.emptyReady}</div>`;
        return;
    }

    data.forEach(item => {
        const status = (item.status || "DRAFT").toUpperCase().trim();
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<div class="item-title">📄 ${item.name}</div>`;

        const actions = document.createElement("div");
        actions.className = "actions";

        if (status === "DRAFT") {
            actions.innerHTML = `
                <button class="edit" onclick="openEdit('${item.id}','${item.file}')">${t.btnEdit}</button>
                <button class="delete" onclick="deletePDF('${item.id}')">${t.btnDelete}</button>
            `;
            div.appendChild(actions);
            draft.appendChild(div);
        } else if (status === "READY") {
            actions.innerHTML = `
                <button class="start" onclick="openImam('${item.id}','${item.file}')">${t.btnStart}</button>
                <button class="delete" onclick="deletePDF('${item.id}')">${t.btnDelete}</button>
            `;
            div.appendChild(actions);
            ready.appendChild(div);
        }
    });
    
    if (draft.innerHTML === "") draft.innerHTML = `<div class="empty-msg">${t.allSet}</div>`;
    if (ready.innerHTML === "") ready.innerHTML = `<div class="empty-msg">${t.completeEdits}</div>`;
}

function openEdit(id, file) {
    window.location.href = `/viewer.html?id=${encodeURIComponent(id)}&file=${encodeURIComponent(file)}&mode=edit`;
}

function openImam(id, file) {
    window.location.href = `/imam.html?id=${encodeURIComponent(id)}&file=${encodeURIComponent(file)}`;
}

async function deletePDF(id) {
    if (!confirm(translations[currentLang].confirmDelete)) return;
    await fetch(`/delete/${id}`, { method: "DELETE" });
    loadList();
}

// 3. INITIALIZE ON STARTUP
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('langSelect').value = currentLang;
    changeLanguage(currentLang);
    loadList();
});

setInterval(loadList, 5000);
</script>

</body>
</html>
